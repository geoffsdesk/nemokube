# NemoKube namespace with Pod Security Admission at "baseline".
#
# "baseline" is required because the sandbox pod:
#   - Runs nemoclaw-start as root initially (needs root for capsh, chattr, gosu)
#   - Uses allowPrivilegeEscalation: true (gosu uses setuid)
#   - Uses a custom seccomp profile (Localhost type, not RuntimeDefault)
#   - Adds specific capabilities (SETUID, SETGID, SETPCAP, CHOWN, FOWNER,
#     DAC_OVERRIDE, LINUX_IMMUTABLE)
#
# "baseline" allows all of the above while still blocking truly dangerous
# configurations (privileged containers, hostNetwork, hostPID).
#
# "restricted" would block root, allowPrivilegeEscalation, capabilities,
# and non-RuntimeDefault seccomp — so it would break nemoclaw-start's
# privilege separation model. We warn on restricted violations.
#
# After nemoclaw-start completes its hardening sequence, the actual
# gateway process runs as unprivileged 'gateway' user with most
# capabilities dropped (via capsh). The root requirement is only
# during the bootstrap phase.
apiVersion: v1
kind: Namespace
metadata:
  name: nemokube
  labels:
    app.kubernetes.io/part-of: nemokube
    # Pod Security Admission — enforce baseline, warn on restricted
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
