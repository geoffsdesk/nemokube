# NemoKube Sandbox — Running the Real NemoClaw Process Chain
#
# v3 architecture: nemoclaw-start runs as PID 1 and performs its own
# security hardening, exactly as it does in NVIDIA's container runtime:
#
#   nemoclaw-start (PID 1, root)
#     → ulimit restrictions
#     → PATH locking (export PATH, readonly PATH)
#     → Config SHA256 integrity check
#     → chattr +i on .openclaw (immutable config)
#     → Capability dropping via capsh --drop=...
#     → gosu gateway openclaw gateway run (privilege separation)
#     → auto-pair watcher (background)
#     → wait on gateway PID
#
# K8s layers on top of nemoclaw-start's native hardening:
#   1. Custom seccomp profile — allows Landlock + capsh + chattr + gosu syscalls
#   2. Credential isolation — inference proxy holds API keys, NOT this pod
#   3. NetworkPolicy — sandbox → proxy → NIM only (05-networkpolicy.yaml)
#   4. PSA baseline — blocks privileged, hostNetwork, hostPID
#
# WHY ROOT IS NEEDED:
#   nemoclaw-start must run as root initially because it:
#   - Calls capsh to drop capabilities (needs CAP_SETPCAP)
#   - Calls chattr +i to make config immutable (needs CAP_LINUX_IMMUTABLE)
#   - Calls gosu to switch to unprivileged 'gateway' user (needs setuid)
#   After gosu, the gateway process runs as 'gateway' (unprivileged).
#   This is the same privilege separation model NVIDIA uses natively.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nemokube
  namespace: nemokube
  labels:
    app.kubernetes.io/name: nemokube
    app.kubernetes.io/part-of: nemokube
    app.kubernetes.io/component: sandbox
spec:
  serviceName: nemokube-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nemokube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nemokube
        app.kubernetes.io/part-of: nemokube
        app.kubernetes.io/component: sandbox
    spec:
      # Pod-level security context.
      # NOTE: runAsNonRoot is deliberately NOT set here.
      # nemoclaw-start needs root initially for privilege separation
      # (capsh, chattr +i, gosu). It drops to 'gateway' user internally.
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: Localhost
          localhostProfile: profiles/nemokube-sandbox.json

      initContainers:
        # Phase 1: Write OpenClaw config pointing at the inference proxy.
        # nemoclaw-start will find this config, SHA256 hash it, and make
        # it immutable with chattr +i. We write it here because on K8s
        # there is no OpenShell L7 proxy on the host — the inference proxy
        # pod replaces that role.
        - name: write-config
          image: nemoclaw-sandbox:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "[nemokube-init] Writing OpenClaw config for K8s inference proxy..."

              # Create config directory structure
              mkdir -p /sandbox/.openclaw
              mkdir -p /sandbox/.openclaw-data
              mkdir -p /sandbox/.nemoclaw

              python3 - <<'PYSETUP'
              import json, os

              config_path = '/sandbox/.openclaw/openclaw.json'

              # Inference proxy endpoint — NOT the NIM service directly.
              # The proxy pod holds the NVIDIA API key and injects it.
              # This replaces OpenShell's host-side L7 proxy on K8s.
              proxy_endpoint = os.environ.get(
                  'INFERENCE_PROXY_ENDPOINT',
                  'http://inference-proxy.nemokube.svc.cluster.local:8080/v1'
              )
              model = os.environ.get('INFERENCE_MODEL', 'nvidia/nemotron-3-nano')

              cfg = {
                  'agents': {
                      'defaults': {
                          'model': {'primary': model}
                      }
                  },
                  'models': {
                      'mode': 'merge',
                      'providers': {
                          'nim-local': {
                              'baseUrl': proxy_endpoint,
                              # No API key here — the inference proxy injects it.
                              # This is the K8s credential isolation boundary,
                              # replacing OpenShell's host-side L7 proxy.
                              'apiKey': 'proxy-injected',
                              'api': 'openai-completions',
                              'models': [{
                                  'id': model.split('/')[-1],
                                  'name': model,
                                  'reasoning': False,
                                  'input': ['text'],
                                  'cost': {
                                      'input': 0, 'output': 0,
                                      'cacheRead': 0, 'cacheWrite': 0
                                  },
                                  'contextWindow': 131072,
                                  'maxTokens': 8192,
                              }]
                          }
                      }
                  },
                  'gateway': {
                      'mode': 'local',
                      'controlUi': {
                          'allowInsecureAuth': True,
                          'dangerouslyDisableDeviceAuth': True,
                          'allowedOrigins': [
                              'http://127.0.0.1:18789',
                              'http://localhost:18789',
                          ],
                      },
                      'trustedProxies': ['127.0.0.1', '::1'],
                  },
              }

              with open(config_path, 'w') as f:
                  json.dump(cfg, f, indent=2)
              os.chmod(config_path, 0o600)
              print(f"[nemokube-init] Config written: model={model}, proxy={proxy_endpoint}")
              print("[nemokube-init] No NVIDIA_API_KEY in sandbox — credential isolation via proxy")
              PYSETUP

              echo "[nemokube-init] Config ready. nemoclaw-start will SHA256-verify and chattr +i it."
          env:
            - name: INFERENCE_PROXY_ENDPOINT
              value: "http://inference-proxy.nemokube.svc.cluster.local:8080/v1"
            - name: INFERENCE_MODEL
              valueFrom:
                configMapKeyRef:
                  name: nemokube-config
                  key: INFERENCE_MODEL
          volumeMounts:
            - name: sandbox-home
              mountPath: /sandbox
            - name: tmp
              mountPath: /tmp
          securityContext:
            # Init runs as root to create dirs with correct ownership
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false

      containers:
        - name: nemokube-sandbox
          image: nemoclaw-sandbox:latest
          # USE THE REAL NEMOCLAW ENTRYPOINT.
          # nemoclaw-start is the actual NemoClaw security bootstrap:
          #   1. Sets ulimits (nofile, nproc, core)
          #   2. Locks PATH (readonly)
          #   3. SHA256-verifies openclaw.json config integrity
          #   4. Makes .openclaw immutable (chattr +i)
          #   5. Drops capabilities via capsh
          #   6. Switches to 'gateway' user via gosu (privilege separation)
          #   7. Starts 'openclaw gateway run' as unprivileged gateway user
          #   8. Starts auto-pair watcher in background
          #   9. Waits on gateway PID
          #
          # This is the full NemoClaw process chain:
          #   nemoclaw-start → gosu gateway → openclaw gateway run
          command: ["/usr/local/bin/nemoclaw-start"]
          ports:
            - name: dashboard
              containerPort: 18789
              protocol: TCP
          env:
            # NO NVIDIA_API_KEY — this is the credential isolation boundary.
            # The sandbox talks to the inference proxy, which injects credentials.
            # This replaces OpenShell's host-side L7 proxy.
            - name: CHAT_UI_URL
              valueFrom:
                configMapKeyRef:
                  name: nemokube-config
                  key: CHAT_UI_URL
            - name: PUBLIC_PORT
              valueFrom:
                configMapKeyRef:
                  name: nemokube-config
                  key: PUBLIC_PORT
            - name: HOME
              value: "/sandbox"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          securityContext:
            # nemoclaw-start MUST start as root for privilege separation:
            #   - capsh needs CAP_SETPCAP to drop capabilities
            #   - chattr +i needs CAP_LINUX_IMMUTABLE for config immutability
            #   - gosu needs setuid to switch to 'gateway' user
            # After gosu, the gateway process runs unprivileged.
            runAsUser: 0
            readOnlyRootFilesystem: false
            # REQUIRED: gosu uses setuid to switch from root to gateway user.
            # Without this, the privilege separation step fails.
            allowPrivilegeEscalation: true
            capabilities:
              add:
                # Needed by nemoclaw-start for its hardening sequence:
                - SETUID        # gosu: switch to gateway user
                - SETGID        # gosu: switch group
                - SETPCAP       # capsh: drop capabilities
                - CHOWN         # fix file ownership before dropping privs
                - FOWNER        # chattr +i: set immutable flag on config
                - DAC_OVERRIDE  # access files during bootstrap as root
                - LINUX_IMMUTABLE  # chattr +i: make .openclaw immutable
              drop:
                # Drop everything else. nemoclaw-start's capsh will further
                # drop capabilities after the hardening sequence completes.
                - ALL
          volumeMounts:
            - name: sandbox-home
              mountPath: /sandbox
            - name: tmp
              mountPath: /tmp
          # exec probe: gateway binds 127.0.0.1 only, tcpSocket via pod IP fails
          readinessProbe:
            exec:
              command: ["sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/18789 && exec 3>&-"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/18789 && exec 3>&-"]
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5

      volumes:
        - name: sandbox-home
          emptyDir:
            sizeLimit: 10Gi
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: nemokube-headless
  namespace: nemokube
  labels:
    app.kubernetes.io/name: nemokube
    app.kubernetes.io/part-of: nemokube
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: nemokube
  ports:
    - name: dashboard
      port: 18789
      targetPort: dashboard
---
# ClusterIP service for accessing the NemoKube dashboard
apiVersion: v1
kind: Service
metadata:
  name: nemokube-dashboard
  namespace: nemokube
  labels:
    app.kubernetes.io/name: nemokube
    app.kubernetes.io/part-of: nemokube
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nemokube
  ports:
    - name: http
      port: 80
      targetPort: dashboard
      protocol: TCP
