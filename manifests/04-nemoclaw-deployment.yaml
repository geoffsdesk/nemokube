# NemoKube Sandbox — Hardened OpenClaw Deployment
# K8s-native translation of NemoClaw's security model:
#
# 1. Landlock filesystem isolation — wrapper applies rules from openclaw-sandbox.yaml
#    before exec'ing the OpenClaw gateway. Requires custom seccomp profile on nodes.
# 2. Credential isolation — sandbox has NO API keys. Inference routes through
#    the inference-proxy pod which injects credentials (matching OpenShell's model).
# 3. seccomp — custom profile allowing Landlock syscalls, blocking dangerous ones.
# 4. SecurityContext — readOnlyRootFilesystem, non-root, drop ALL capabilities.
# 5. NetworkPolicy — applied separately in 05-networkpolicy.yaml.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nemokube
  namespace: nemokube
  labels:
    app.kubernetes.io/name: nemokube
    app.kubernetes.io/part-of: nemokube
    app.kubernetes.io/component: sandbox
spec:
  serviceName: nemokube-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nemokube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nemokube
        app.kubernetes.io/part-of: nemokube
        app.kubernetes.io/component: sandbox
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000     # 'sandbox' user in NemoClaw image
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: Localhost
          localhostProfile: profiles/nemokube-sandbox.json

      initContainers:
        # Phase 1: Run nemoclaw-start to bootstrap plugins and auth tokens,
        # then write the OpenClaw config pointing at the inference proxy
        # (NOT directly at NIM — credentials stay out of this pod).
        - name: setup
          image: nemoclaw-sandbox:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "[nemokube-init] Bootstrapping NemoClaw plugins..."

              # Run nemoclaw-start for side effects (plugins, config scaffolding)
              timeout 60 /usr/local/bin/nemoclaw-start 2>/dev/null || true

              echo "[nemokube-init] Writing OpenClaw config (inference → proxy, no API keys)..."
              python3 - <<'PYSETUP'
              import json, os

              home = os.environ.get('HOME', '/sandbox')
              config_path = os.path.join(home, '.openclaw', 'openclaw.json')
              os.makedirs(os.path.dirname(config_path), exist_ok=True)

              # Inference proxy endpoint — NOT the NIM service directly.
              # The proxy pod holds the NVIDIA API key and injects it.
              proxy_endpoint = os.environ.get(
                  'INFERENCE_PROXY_ENDPOINT',
                  'http://inference-proxy.nemokube.svc.cluster.local:8080/v1'
              )
              model = os.environ.get('INFERENCE_MODEL', 'nvidia/nemotron-3-nano')

              cfg = {
                  'agents': {
                      'defaults': {
                          'model': {'primary': model}
                      }
                  },
                  'models': {
                      'mode': 'merge',
                      'providers': {
                          'nim-local': {
                              'baseUrl': proxy_endpoint,
                              # No API key here — the proxy injects it.
                              # This is the credential isolation boundary.
                              'apiKey': 'proxy-injected',
                              'api': 'openai-completions',
                              'models': [{
                                  'id': model.split('/')[-1],
                                  'name': model,
                                  'reasoning': False,
                                  'input': ['text'],
                                  'cost': {
                                      'input': 0, 'output': 0,
                                      'cacheRead': 0, 'cacheWrite': 0
                                  },
                                  'contextWindow': 131072,
                                  'maxTokens': 8192,
                              }]
                          }
                      }
                  },
                  'gateway': {
                      'mode': 'local',
                      'controlUi': {
                          'allowInsecureAuth': True,
                          'dangerouslyDisableDeviceAuth': True,
                          'allowedOrigins': [
                              'http://127.0.0.1:18789',
                              'http://localhost:18789',
                          ],
                      },
                      'trustedProxies': ['127.0.0.1', '::1'],
                  },
              }

              with open(config_path, 'w') as f:
                  json.dump(cfg, f, indent=2)
              os.chmod(config_path, 0o600)
              print(f"[nemokube-init] Config written: model={model}, proxy={proxy_endpoint}")
              print("[nemokube-init] NOTE: No NVIDIA_API_KEY in sandbox — credential isolation active")
              PYSETUP

              # Ensure writable dirs exist for Landlock rules
              mkdir -p ~/.openclaw-data ~/.nemoclaw
              echo "[nemokube-init] Init complete."
          env:
            - name: INFERENCE_PROXY_ENDPOINT
              value: "http://inference-proxy.nemokube.svc.cluster.local:8080/v1"
            - name: INFERENCE_MODEL
              valueFrom:
                configMapKeyRef:
                  name: nemokube-config
                  key: INFERENCE_MODEL
          volumeMounts:
            - name: sandbox-home
              mountPath: /sandbox
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false  # init needs to write to bootstrap

      containers:
        - name: nemokube-sandbox
          image: nemoclaw-sandbox:latest
          # Landlock wrapper applies filesystem restrictions from
          # openclaw-sandbox.yaml, then execs openclaw gateway run.
          command: ["python3", "/usr/local/bin/landlock-wrapper.py"]
          args: ["openclaw", "gateway", "run"]
          ports:
            - name: dashboard
              containerPort: 18789
              protocol: TCP
          env:
            # NO NVIDIA_API_KEY — this is the credential isolation boundary.
            # The sandbox talks to the inference proxy, which injects credentials.
            - name: CHAT_UI_URL
              valueFrom:
                configMapKeyRef:
                  name: nemokube-config
                  key: CHAT_UI_URL
            - name: PUBLIC_PORT
              valueFrom:
                configMapKeyRef:
                  name: nemokube-config
                  key: PUBLIC_PORT
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          securityContext:
            readOnlyRootFilesystem: false  # Landlock handles fine-grained FS control
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: sandbox-home
              mountPath: /sandbox
            - name: tmp
              mountPath: /tmp
            - name: landlock-wrapper
              mountPath: /usr/local/bin/landlock-wrapper.py
              subPath: landlock-wrapper.py
              readOnly: true
          # exec probe: gateway binds 127.0.0.1 only, tcpSocket via pod IP fails
          readinessProbe:
            exec:
              command: ["sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/18789 && exec 3>&-"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/18789 && exec 3>&-"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5

      volumes:
        - name: sandbox-home
          emptyDir:
            sizeLimit: 10Gi
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: landlock-wrapper
          configMap:
            name: landlock-wrapper
            defaultMode: 0555
---
# Landlock wrapper script as a ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: landlock-wrapper
  namespace: nemokube
  labels:
    app.kubernetes.io/part-of: nemokube
data:
  landlock-wrapper.py: |
    # This file is deployed from scripts/landlock-wrapper.py
    # See the source file for full documentation.
    # Content is injected by deploy.sh at deployment time.
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: nemokube-headless
  namespace: nemokube
  labels:
    app.kubernetes.io/name: nemokube
    app.kubernetes.io/part-of: nemokube
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: nemokube
  ports:
    - name: dashboard
      port: 18789
      targetPort: dashboard
---
# ClusterIP service for accessing the NemoKube dashboard
apiVersion: v1
kind: Service
metadata:
  name: nemokube-dashboard
  namespace: nemokube
  labels:
    app.kubernetes.io/name: nemokube
    app.kubernetes.io/part-of: nemokube
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nemokube
  ports:
    - name: http
      port: 80
      targetPort: dashboard
      protocol: TCP
