# Secrets for NemoKube deployment.
# IMPORTANT: Replace placeholder values before applying,
# or use: kubectl create secret generic nemokube-secrets --from-literal=...
#
# For production, use GKE Workload Identity + Secret Manager instead.
apiVersion: v1
kind: Secret
metadata:
  name: nemokube-secrets
  namespace: nemokube
  labels:
    app.kubernetes.io/part-of: nemokube
type: Opaque
stringData:
  # Required: your NVIDIA API key from build.nvidia.com
  NVIDIA_API_KEY: "REPLACE_WITH_YOUR_NVIDIA_API_KEY"
  # Optional: only needed if using Telegram bridge
  TELEGRAM_BOT_TOKEN: ""
