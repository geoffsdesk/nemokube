# Inference Proxy — credential isolation layer
# Mirrors OpenShell's inference routing: the sandbox never sees API keys.
# Accepts unauthenticated requests from the sandbox pod, injects the
# NVIDIA API key, and forwards to the NIM service.
#
# This is the K8s-native equivalent of OpenShell's host-side gateway
# intercepting sandbox→inference.local traffic.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-proxy
  namespace: nemokube
  labels:
    app.kubernetes.io/name: inference-proxy
    app.kubernetes.io/part-of: nemokube
    app.kubernetes.io/component: inference-routing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-proxy
        app.kubernetes.io/part-of: nemokube
        app.kubernetes.io/component: inference-routing
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534  # nobody
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: node:22-alpine
          command: ["node", "-e"]
          args:
            - |
              const http = require('http');

              const NIM_HOST = process.env.NIM_HOST || 'nim-service.nemokube.svc.cluster.local';
              const NIM_PORT = parseInt(process.env.NIM_PORT || '8000');
              const API_KEY  = process.env.NVIDIA_API_KEY || '';

              if (!API_KEY) {
                console.error('[inference-proxy] FATAL: NVIDIA_API_KEY not set');
                process.exit(1);
              }

              const server = http.createServer((req, res) => {
                // Local health endpoint (proxy itself is healthy)
                if (req.url === '/healthz') {
                  res.writeHead(200, { 'Content-Type': 'application/json' });
                  res.end(JSON.stringify({ status: 'ok', upstream: `${NIM_HOST}:${NIM_PORT}` }));
                  return;
                }

                // Strip any incoming Authorization header (sandbox shouldn't have one)
                const headers = { ...req.headers };
                delete headers['authorization'];

                // Inject the real API key — this is the credential isolation boundary.
                // The sandbox pod never has NVIDIA_API_KEY in its environment.
                headers['authorization'] = `Bearer ${API_KEY}`;
                headers['host'] = `${NIM_HOST}:${NIM_PORT}`;

                const proxy = http.request({
                  hostname: NIM_HOST,
                  port: NIM_PORT,
                  path: req.url,
                  method: req.method,
                  headers: headers,
                }, (upstream) => {
                  res.writeHead(upstream.statusCode, upstream.headers);
                  upstream.pipe(res);
                });

                proxy.on('error', (err) => {
                  console.error(`[inference-proxy] Upstream error: ${err.message}`);
                  if (!res.headersSent) {
                    res.writeHead(502, { 'Content-Type': 'application/json' });
                    res.end(JSON.stringify({ error: 'inference proxy: upstream unavailable' }));
                  }
                });

                req.pipe(proxy);
              });

              server.listen(8080, '0.0.0.0', () => {
                console.log(`[inference-proxy] Listening on 0.0.0.0:8080 -> ${NIM_HOST}:${NIM_PORT}`);
                console.log('[inference-proxy] API key injection active, sandbox credential isolation enforced');
              });
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nemokube-secrets
                  key: NVIDIA_API_KEY
            - name: NIM_HOST
              value: "nim-service.nemokube.svc.cluster.local"
            - name: NIM_PORT
              value: "8000"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: inference-proxy
  namespace: nemokube
  labels:
    app.kubernetes.io/name: inference-proxy
    app.kubernetes.io/part-of: nemokube
    app.kubernetes.io/component: inference-routing
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inference-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
