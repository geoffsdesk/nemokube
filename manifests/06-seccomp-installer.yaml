# Seccomp Profile Installer — DaemonSet
# Deploys a custom seccomp profile to every node that allows:
#   - Landlock syscalls (444-446) for filesystem isolation
#   - capsh/chattr/gosu syscalls for nemoclaw-start's privilege separation
#
# nemoclaw-start needs these additional syscalls beyond RuntimeDefault:
#   - landlock_create_ruleset (444), landlock_add_rule (445),
#     landlock_restrict_self (446) — Landlock filesystem isolation
#   - chroot — used by capsh for capability dropping
#   - ioctl — used by chattr +i for immutable config
#   - setuid/setgid — used by gosu for privilege separation
#
# GKE's Container-Optimized OS (kernel 5.15+) supports Landlock, but the
# default RuntimeDefault seccomp profile blocks the Landlock syscalls (444-446).
#
# Requires: cluster-admin (DaemonSet writes to /var/lib/kubelet/seccomp/)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: seccomp-installer
  namespace: kube-system
  labels:
    app.kubernetes.io/name: seccomp-installer
    app.kubernetes.io/part-of: nemokube
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seccomp-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seccomp-installer
    spec:
      # Needs host access to write seccomp profiles to kubelet directory
      hostPID: false
      hostNetwork: false
      initContainers:
        - name: install-profile
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /host/var/lib/kubelet/seccomp/profiles
              cat > /host/var/lib/kubelet/seccomp/profiles/nemokube-sandbox.json << 'SECCOMP_EOF'
              {
                "defaultAction": "SCMP_ACT_ERRNO",
                "architectures": ["SCMP_ARCH_X86_64", "SCMP_ARCH_X86", "SCMP_ARCH_AARCH64"],
                "syscalls": [
                  {
                    "names": [
                      "accept", "accept4", "access", "adjtimex", "alarm", "bind",
                      "brk", "capget", "capset", "chdir", "chmod", "chown", "chown32", "chroot",
                      "clock_adjtime", "clock_getres", "clock_gettime", "clock_nanosleep",
                      "close", "close_range", "connect", "copy_file_range", "creat",
                      "dup", "dup2", "dup3", "epoll_create", "epoll_create1",
                      "epoll_ctl", "epoll_ctl_old", "epoll_pwait", "epoll_pwait2",
                      "epoll_wait", "epoll_wait_old", "eventfd", "eventfd2",
                      "execve", "execveat", "exit", "exit_group", "faccessat",
                      "faccessat2", "fadvise64", "fallocate", "fanotify_mark",
                      "fchdir", "fchmod", "fchmodat", "fchown", "fchown32",
                      "fchownat", "fcntl", "fcntl64", "fdatasync", "fgetxattr",
                      "flistxattr", "flock", "fork", "fremovexattr", "fsetxattr",
                      "fstat", "fstat64", "fstatat64", "fstatfs", "fstatfs64",
                      "fsync", "ftruncate", "ftruncate64", "futex", "futex_waitv",
                      "futimesat", "getcpu", "getcwd", "getdents", "getdents64",
                      "getegid", "getegid32", "geteuid", "geteuid32", "getgid",
                      "getgid32", "getgroups", "getgroups32", "getitimer", "getpeername",
                      "getpgid", "getpgrp", "getpid", "getppid", "getpriority",
                      "getrandom", "getresgid", "getresgid32", "getresuid",
                      "getresuid32", "getrlimit", "get_robust_list", "getrusage",
                      "getsid", "getsockname", "getsockopt", "get_thread_area",
                      "gettid", "gettimeofday", "getuid", "getuid32", "getxattr",
                      "inotify_add_watch", "inotify_init", "inotify_init1",
                      "inotify_rm_watch", "io_cancel", "ioctl", "io_destroy",
                      "io_getevents", "io_pgetevents", "ioprio_get", "ioprio_set",
                      "io_setup", "io_submit", "io_uring_enter", "io_uring_register",
                      "io_uring_setup", "ipc", "kill", "lchown", "lchown32",
                      "lgetxattr", "link", "linkat", "listen", "listxattr",
                      "llistxattr", "lremovexattr", "lseek", "lsetxattr", "lstat",
                      "lstat64", "madvise", "membarrier", "memfd_create",
                      "memfd_secret", "mincore", "mkdir", "mkdirat", "mknod",
                      "mknodat", "mlock", "mlock2", "mlockall", "mmap", "mmap2",
                      "mprotect", "mq_getsetattr", "mq_notify", "mq_open",
                      "mq_timedreceive", "mq_timedsend", "mq_unlink", "mremap",
                      "msgctl", "msgget", "msgrcv", "msgsnd", "msync", "munlock",
                      "munlockall", "munmap", "nanosleep", "newfstatat",
                      "open", "openat", "openat2", "pause", "pidfd_open",
                      "pidfd_send_signal", "pipe", "pipe2", "poll", "ppoll",
                      "prctl", "pread64", "preadv", "preadv2", "prlimit64",
                      "pselect6", "pwrite64", "pwritev", "pwritev2", "read",
                      "readahead", "readlink", "readlinkat", "readv", "recv",
                      "recvfrom", "recvmmsg", "recvmsg", "remap_file_pages",
                      "removexattr", "rename", "renameat", "renameat2",
                      "restart_syscall", "rmdir", "rseq", "rt_sigaction",
                      "rt_sigpending", "rt_sigprocmask", "rt_sigqueueinfo",
                      "rt_sigreturn", "rt_sigsuspend", "rt_sigtimedwait",
                      "rt_tgsigqueueinfo", "sched_getaffinity", "sched_getattr",
                      "sched_getparam", "sched_get_priority_max",
                      "sched_get_priority_min", "sched_getscheduler",
                      "sched_setaffinity", "sched_setattr", "sched_setparam",
                      "sched_setscheduler", "sched_yield", "seccomp", "select",
                      "semctl", "semget", "semop", "semtimedop", "send",
                      "sendfile", "sendfile64", "sendmmsg", "sendmsg", "sendto",
                      "setfsgid", "setfsgid32", "setfsuid", "setfsuid32",
                      "setgid", "setgid32", "setgroups", "setgroups32",
                      "setitimer", "setpgid", "setpriority", "setregid",
                      "setregid32", "setresgid", "setresgid32", "setresuid",
                      "setresuid32", "setreuid", "setreuid32", "setrlimit",
                      "set_robust_list", "setsid", "setsockopt", "set_thread_area",
                      "set_tid_address", "setuid", "setuid32", "setxattr",
                      "shmat", "shmctl", "shmdt", "shmget", "shutdown",
                      "sigaltstack", "signalfd", "signalfd4", "sigprocmask",
                      "sigreturn", "socket", "socketcall", "socketpair",
                      "splice", "stat", "stat64", "statfs", "statfs64",
                      "statx", "symlink", "symlinkat", "sync", "sync_file_range",
                      "syncfs", "sysinfo", "tee", "tgkill", "time",
                      "timer_create", "timer_delete", "timer_getoverrun",
                      "timer_gettime", "timer_settime", "timerfd_create",
                      "timerfd_gettime", "timerfd_settime", "times", "tkill",
                      "truncate", "truncate64", "ugetrlimit", "umask", "uname",
                      "unlink", "unlinkat", "utime", "utimensat", "utimes",
                      "vfork", "vmsplice", "wait4", "waitid", "waitpid",
                      "write", "writev",
                      "_llseek", "_newselect", "arch_prctl", "modify_ldt",
                      "clone", "clone3",
                      "landlock_create_ruleset",
                      "landlock_add_rule",
                      "landlock_restrict_self"
                    ],
                    "action": "SCMP_ACT_ALLOW"
                  },
                  {
                    "names": ["personality"],
                    "action": "SCMP_ACT_ALLOW",
                    "args": [
                      { "index": 0, "value": 0, "op": "SCMP_CMP_EQ" }
                    ]
                  },
                  {
                    "names": ["personality"],
                    "action": "SCMP_ACT_ALLOW",
                    "args": [
                      { "index": 0, "value": 8, "op": "SCMP_CMP_EQ" }
                    ]
                  },
                  {
                    "names": ["personality"],
                    "action": "SCMP_ACT_ALLOW",
                    "args": [
                      { "index": 0, "value": 131072, "op": "SCMP_CMP_EQ" }
                    ]
                  },
                  {
                    "names": ["personality"],
                    "action": "SCMP_ACT_ALLOW",
                    "args": [
                      { "index": 0, "value": 131080, "op": "SCMP_CMP_EQ" }
                    ]
                  },
                  {
                    "names": ["personality"],
                    "action": "SCMP_ACT_ALLOW",
                    "args": [
                      { "index": 0, "value": 4294967295, "op": "SCMP_CMP_EQ" }
                    ]
                  }
                ]
              }
              SECCOMP_EOF
              echo "[seccomp-installer] Profile installed at /var/lib/kubelet/seccomp/profiles/nemokube-sandbox.json"
          volumeMounts:
            - name: host-kubelet
              mountPath: /host/var/lib/kubelet
          securityContext:
            # Needs write access to kubelet directory
            privileged: false
            runAsUser: 0
      containers:
        # Sleep forever — DaemonSet keeps the profile installed across node restarts
        - name: keep-alive
          image: busybox:1.36
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "1m"
              memory: "4Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
      volumes:
        - name: host-kubelet
          hostPath:
            path: /var/lib/kubelet
            type: DirectoryOrCreate
      tolerations:
        # Run on ALL nodes including GPU nodes
        - operator: "Exists"
